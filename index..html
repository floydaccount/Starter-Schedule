<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Starter Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f4f1ea; color: #1a1a1a; min-height: 100vh; }


  /* Login screen */
  #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a3a1a;
    display: flex; align-items: center; justify-content: center; z-index: 9999; }
  #login-box { background: #fff; border-radius: 14px; padding: 40px 36px; width: 320px;
    text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  #login-box .golf-icon { font-size: 42px; margin-bottom: 12px; }
  #login-box h2 { font-size: 20px; color: #1a3a1a; margin-bottom: 4px; }
  #login-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
  #login-box input { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1.5px solid #c8b87a;
    font-size: 15px; font-family: Georgia, serif; outline: none; text-align: center;
    letter-spacing: 3px; margin-bottom: 14px; }
  #login-box button { width: 100%; padding: 11px; border-radius: 8px; border: none; cursor: pointer;
    background: #1a3a1a; color: #e8d8a0; font-size: 15px; font-family: Georgia, serif;
    font-weight: bold; letter-spacing: 1px; transition: background 0.15s; }
  #login-box button:hover { background: #2a5a2a; }
  #login-error { color: #c0392b; font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* Header */
  #header { background: #1a3a1a; color: #e8d8a0; padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  #header-icon { font-size: 28px; }
  #header-titles { flex: 1; }
  #header-titles h1 { font-size: 20px; letter-spacing: 1px; }
  #header-titles p { font-size: 12px; opacity: 0.7; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  #coverage-badge { font-size: 12px; margin-top: 6px; background: rgba(232,216,160,0.2); border: 1px solid rgba(232,216,160,0.4); border-radius: 4px; padding: 2px 8px; display: inline-block; color: #e8d8a0; }
  #tab-bar { display: flex; gap: 8px; }
  .tab-btn { padding: 6px 18px; border-radius: 20px; border: none; cursor: pointer; font-size: 13px; font-family: Georgia, serif; transition: background 0.15s; }
  .tab-btn.active { background: #e8d8a0; color: #1a3a1a; }
  .tab-btn.inactive { background: rgba(255,255,255,0.15); color: #e8d8a0; }

  /* Main */
  #main { padding: 20px 24px; max-width: 960px; margin: 0 auto; }

  /* Filters */
  #filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  #search-input { flex: 1 1 200px; padding: 9px 14px; border-radius: 8px; border: 1.5px solid #c8b87a; font-size: 15px; background: #fff; font-family: Georgia, serif; outline: none; }
  .filter-select { padding: 9px 12px; border-radius: 8px; border: 1.5px solid #c8b87a; font-size: 14px; background: #fff; font-family: Georgia, serif; cursor: pointer; }

  /* Result count */
  #result-count { font-size: 13px; color: #666; margin-bottom: 12px; }
  .search-badge { margin-left: 8px; background: #1a3a1a; color: #e8d8a0; border-radius: 10px; padding: 2px 10px; font-size: 12px; }

  /* Table */
  .table-wrap { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-family: Georgia, serif; }
  thead tr { border-bottom: 2px solid #1a3a1a; }
  th { text-align: left; padding: 12px 18px; font-size: 14px; font-weight: bold; color: #1a1a1a; letter-spacing: 0.5px; white-space: nowrap; }
  td { padding: 11px 18px; font-size: 14px; white-space: nowrap; }
  tr.even { background: #fff; }
  tr.odd { background: #faf8f3; }
  tr { border-bottom: 1px solid #f0ece0; }
  td.bold { font-weight: bold; }
  td.muted { color: #444; }

  /* Course badge */
  .badge { border-radius: 10px; padding: 2px 10px; font-size: 13px; font-weight: bold; display: inline-block; }
  .badge-links { background: #e8f5ed; color: #1a6b3a; }
  .badge-harbor { background: #e8f0fb; color: #1a4a8a; }

  /* Totals bar */
  #totals-bar { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .month-total { background: #1a3a1a; color: #e8d8a0; border-radius: 8px; padding: 8px 18px; font-size: 14px; }
  .grand-total { background: #c8b87a; color: #1a1a1a; border-radius: 8px; padding: 8px 18px; font-size: 14px; font-weight: bold; }

  /* Person buttons */
  #person-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .person-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid #c8b87a; cursor: pointer; font-size: 13px; font-family: Georgia, serif; background: #fff; color: #1a1a1a; transition: background 0.15s; }
  .person-btn.selected { background: #1a3a1a; color: #e8d8a0; }
  #person-label { font-size: 13px; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  #person-name { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  #person-shifts { font-size: 13px; color: #666; margin-bottom: 16px; }

  /* Empty states */
  .empty { text-align: center; padding: 60px; color: #888; font-size: 16px; }

  /* View panels */
  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>


<div id="login-screen">
  <div id="login-box">
    <div class="golf-icon">⛳</div>
    <h2>Starter Schedule</h2>
    <p>Enter the password to continue</p>
    <input type="password" id="password-input" placeholder="Password"
      onkeydown="if(event.key==='Enter') checkPassword()">
    <button onclick="checkPassword()">Enter</button>
    <div id="login-error"></div>
  </div>
</div>

<div id="header">
  <span id="header-icon">⛳</span>
  <div id="header-titles">
    <h1>2026 Starter Schedule</h1>
    <p>Links &amp; Harbor Courses</p>
    <div id="coverage-badge">📅 Covers: January – June 2026</div>
  </div>
  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchView('search')">Search</button>
    <button class="tab-btn inactive" onclick="switchView('person')">By Person</button>
  </div>
</div>

<div id="main">

  <!-- SEARCH VIEW -->
  <div id="view-search" class="view active">
    <div id="filters">
      <select class="filter-select" id="search-input" onchange="renderSearch()" style="font-size:15px; padding:10px 16px; min-width:200px;">
        <option value="">👤 All Starters</option>
      </select>
      <select class="filter-select" id="month-filter" onchange="renderSearch()">
        <option value="All">All Months</option>
        <option>January</option><option>February</option><option>March</option>
        <option>April</option><option>May</option><option>June</option>
      </select>
      <select class="filter-select" id="course-filter" onchange="renderSearch()">
        <option value="All">All Courses</option>
        <option>Links</option><option>Harbor</option>
      </select>
    </div>
    <div id="result-count"></div>
    <div id="search-results"></div>
    <div id="totals-bar"></div>
  </div>

  <!-- PERSON VIEW -->
  <div id="view-person" class="view">
    <div id="person-label">Select a Starter</div>
    <div style="margin-bottom:20px;">
      <select id="person-select" class="filter-select" onchange="selectPerson(this.value)" style="font-size:15px; padding:10px 16px; min-width:220px;">
        <option value="">-- Choose a name --</option>
      </select>
      <span id="person-shift-count" style="margin-left:12px; font-size:13px; color:#666;"></span>
    </div>
    <div id="person-detail"></div>
  </div>

</div>

const MONTHS = ["January","February","March","April","May","June"];

function shiftHours(shift) {
  const parts = shift.trim().split('-');
  if (parts.length !== 2) return 0;
  function toH(t) {
    if (t.includes(':')) { const [h,m] = t.split(':'); return parseInt(h) + parseInt(m)/60; }
    return parseFloat(t);
  }
  try {
    let start = toH(parts[0]), end = toH(parts[1]);
    if (end <= start) end += 12;
    return Math.round((end - start) * 10) / 10;
  } catch(e) { return 0; }
}

function courseBadge(course) {
  const cls = course === 'Links' ? 'badge-links' : 'badge-harbor';
  return `<span class="badge ${cls}">${course}</span>`;
}

function buildTable(rows, showName) {
  const cols = showName
    ? ['Date','Day','Name','Course','Shift','Hours']
    : ['Date','Day','Course','Shift','Hours'];
  let html = `<div class="table-wrap"><table><thead><tr>`;
  cols.forEach(c => html += `<th>${c}</th>`);
  html += `</tr></thead><tbody>`;
  rows.forEach((e, i) => {
    const hrs = shiftHours(e.shift);
    const rowClass = i % 2 === 0 ? 'even' : 'odd';
    html += `<tr class="${rowClass}">`;
    html += `<td class="bold">${e.date}</td>`;
    html += `<td class="muted">${e.day}</td>`;
    if (showName) html += `<td class="bold">${e.name}</td>`;
    html += `<td>${courseBadge(e.course)}</td>`;
    html += `<td class="muted">${e.shift}</td>`;
    html += `<td class="muted">${hrs}h</td>`;
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function buildTotals(rows) {
  const monthTotals = {};
  rows.forEach(e => {
    if (!monthTotals[e.month]) monthTotals[e.month] = 0;
    monthTotals[e.month] = Math.round((monthTotals[e.month] + shiftHours(e.shift)) * 10) / 10;
  });
  const months = MONTHS.filter(m => monthTotals[m]);
  if (months.length === 0) return '';
  const grandTotal = Math.round(months.reduce((a,m) => a + monthTotals[m], 0) * 10) / 10;
  let html = '';
  months.forEach(m => {
    html += `<div class="month-total"><span style="opacity:0.8">${m}: </span><strong>${monthTotals[m]}h</strong></div>`;
  });
  if (months.length > 1) {
    html += `<div class="grand-total">Total: ${grandTotal}h</div>`;
  }
  return html;
}

function renderSearch() {
  const query = document.getElementById('search-input').value;
  const month = document.getElementById('month-filter').value;
  const course = document.getElementById('course-filter').value;

  const filtered = RAW_DATA.filter(e => {
    return (query === '' || e.name === query)
      && (month === 'All' || e.month === month)
      && (course === 'All' || e.course === course);
  });

  // Count display
  const countEl = document.getElementById('result-count');
  let countHtml = `${filtered.length} assignment${filtered.length !== 1 ? 's' : ''} found`;
  if (query) countHtml += ` <span class="search-badge">${query}</span>`;
  countEl.innerHTML = countHtml;

  // Table
  const resultsEl = document.getElementById('search-results');
  if (filtered.length === 0) {
    resultsEl.innerHTML = '<div class="empty">No assignments found</div>';
    document.getElementById('totals-bar').innerHTML = '';
    return;
  }
  resultsEl.innerHTML = buildTable(filtered, true);
  document.getElementById('totals-bar').innerHTML = buildTotals(filtered);
}

// Build person dropdown
let selectedPerson = null;
const allNames = [...new Set(RAW_DATA.map(r => r.name))].sort();

function renderPersonButtons() {
  const el = document.getElementById('person-select');
  if (!el) return;
  el.innerHTML = '<option value="">-- Choose a name --</option>' +
    allNames.map(name => `<option value="${name}">${name}</option>`).join('');
}

function selectPerson(name) {
  selectedPerson = name;
  if (!name) {
    document.getElementById('person-detail').innerHTML = '<div class="empty">Select a name above to see their full schedule</div>';
    document.getElementById('person-shift-count').textContent = '';
    return;
  }
  const rows = RAW_DATA.filter(e => e.name === name).sort((a,b) => {
    const mi = m => MONTHS.indexOf(m);
    const dn = d => parseInt(d.split(' ')[1]);
    if (mi(a.month) !== mi(b.month)) return mi(a.month) - mi(b.month);
    return dn(a.date) - dn(b.date);
  });
  document.getElementById('person-shift-count').textContent = `${rows.length} shift${rows.length !== 1 ? 's' : ''} scheduled`;
  const detail = document.getElementById('person-detail');
  detail.innerHTML = `
    <div id="person-name">${name}</div>
    ${rows.length === 0 ? '<div class="empty">No shifts found</div>' : buildTable(rows, false)}
    <div id="person-totals-bar" style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">${buildTotals(rows)}</div>
  `;
}

function switchView(view) {
  document.getElementById('view-search').classList.toggle('active', view === 'search');
  document.getElementById('view-person').classList.toggle('active', view === 'person');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.className = 'tab-btn ' + ((i === 0 && view === 'search') || (i === 1 && view === 'person') ? 'active' : 'inactive');
  });
}

function checkPassword() {
  const input = document.getElementById('password-input').value;
  if (input === CORRECT_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';

  } else {
    document.getElementById('login-error').textContent = 'Incorrect password. Try again.';

}
